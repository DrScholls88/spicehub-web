      "recipeYield": "4",
      "totalTime": "PT30M",
      "recipeIngredient": [
        "4 ears corn, husked",
        "4 tbsp unsalted butter, softened",
        "2 tbsp gochujang",
        "1 tbsp honey",
        "1 lime, zested and juiced",
        "2 tbsp mayonnaise",
        "1/4 cup grated cotija",
        "2 green onions, thinly sliced",
        "Toasted sesame seeds"
      ],
      "recipeInstructions": [
        "Carefully quarter each ear of corn lengthwise into ribs.",
        "Mash butter with gochujang, honey and lime zest into a paste.",
        "Toss the ribs with half the gochujang butter and roast at 425F for 20 minutes until curled and charred at the edges.",
        "Brush with remaining butter, then drizzle with mayo thinned with lime juice.",
        "Shower with cotija, green onions and sesame seeds."
      ]
    }
  ]
