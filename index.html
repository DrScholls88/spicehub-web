<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌶️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#e65100" />
    <!--
      Content-Security-Policy (defense-in-depth against XSS, layered on top of
      the escaping/sanitization fixes in recipeTemplates.js/exportRenderer.js
      and PhotoGallery.jsx). Notes on the choices below:
      - script-src has no 'unsafe-inline'/'unsafe-eval': this is the directive
        that actually blocks injected script execution. Everything else here
        is secondary.
      - style-src keeps 'unsafe-inline': React sets inline style properties via
        the CSSOM (not HTML attribute parsing, so it isn't itself an XSS vector
        the way inline scripts are), and the exported recipe HTML previews
        (ExportSheet.jsx) embed style blocks for print/card layouts.
      - img-src/media-src allow https/blob broadly because recipe photos and
        videos are hotlinked from arbitrary source sites/Instagram CDNs by
        design, that's the app's core function, not a vulnerability, since
        img/video tags can't execute script.
      - connect-src allows https broadly because the import pipeline talks to
        several external hosts (Render-hosted backend, Gemini API, image/video
        proxies) that can change independently of this file; script-src being
        locked down is the primary control against exfiltration via injected
        fetch calls.
      - frame-ancestors is NOT enforced by this meta tag (browsers ignore it
        there per spec), it's set for real via HTTP response headers in
        vercel.json and server/index.js instead. Kept here as documentation.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; media-src 'self' data: blob: https:; connect-src 'self' https: wss:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SpiceHub" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>SpiceHub - Meal Spinner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
