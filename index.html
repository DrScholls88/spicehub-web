<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌶️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#e65100" />
    <!--
      Content-Security-Policy: enforced via HTTP response header in
      vercel.json (see the `headers` block, source "/(.*)"), not here.
      A <meta http-equiv="Content-Security-Policy"> tag was previously
      duplicated in this file; dropped 2026-07-07 per
      docs/superpowers/specs/2026-07-07-photo-import-csp-fix-design.md
      Component 4 — the header form is the single source of truth, avoids
      drift between two copies, and supports frame-ancestors (which browsers
      silently ignore when set via <meta>, so the old copy here was legally
      inert for that directive). No directive values changed.
    -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SpiceHub" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>SpiceHub - Meal Spinner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
